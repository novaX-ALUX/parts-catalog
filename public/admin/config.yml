backend:
  name: github
  repo: novaX-ALUX/parts-catalog
  branch: main
  base_url: https://sveltia-cms-auth.novax-cms.workers.dev

site_url: https://novax-alux.github.io/parts-catalog
publish_mode: editorial_workflow
media_folder: public/images/products
public_folder: /images/products

_spec_field: &spec_field
  label: Spec Rows
  name: specs
  widget: list
  fields:
    - { label: Key, name: key, widget: string }
    - { label: Value, name: value, widget: string }

_base_fields: &base_fields
  - { label: Name, name: name, widget: string }
  - { label: Tagline, name: tagline, widget: string, required: false }
  - { label: Image, name: image, widget: image, required: false, multiple: false }
  - { label: Picture Key, name: pictureKey, widget: string, required: false, hint: "PPTX identifier (auto-set by import)" }
  - { label: Order, name: order, widget: number, default: 999, value_type: int, hint: "Lower number = shown first within its category" }
  - <<: *spec_field
  - { label: Description, name: description, widget: text, required: false, hint: "Description 탭에 표시되는 긴 설명" }
  - { label: Pinout Image, name: pinoutImage, widget: image, required: false, hint: "Pinout 탭 이미지 (한 장). 여러 장이면 아래 Pinout Images 사용" }
  - { label: Pinout Images, name: pinoutImages, widget: list, required: false, field: { label: Image, name: image, widget: image }, hint: "Pinout 탭 이미지 여러 장 — 위에서부터 표시 순서. 설정 시 위의 단일 Pinout Image보다 우선" }
  - { label: Pinout Notes, name: pinoutNotes, widget: text, required: false, hint: "Pinout 탭 본문" }
  - { label: Firmware Notes, name: firmwareNotes, widget: text, required: false, hint: "FC / ESC — Firmware 탭 상단 텍스트" }
  - label: Firmware Downloads
    name: firmware
    widget: list
    required: false
    hint: "FC / ESC — 다운로드 표. 파일은 public/firmware/{fc|esc}/{slug}/v{X.Y.Z}/ 에 git push 후 경로만 적기"
    fields:
      - { label: Type, name: kind, widget: string, hint: "예) ArduPilot (Copter), DFU (Boot+App)" }
      - { label: File Path, name: file, widget: string, hint: "GitHub Release URL(권장) 예) https://github.com/novaX-ALUX/flight_controller/releases/download/v0.1.4/AF-H7E_v0.1.4.zip — 또는 로컬 경로 /firmware/fc/{slug}/..." }
      - { label: Version, name: version, widget: string, hint: "예) 1.2.0" }
      - { label: Date, name: date, widget: string, required: false, hint: "YYYY-MM-DD" }
      - { label: Size, name: size, widget: string, required: false, hint: "예) 896 KB" }
      - { label: SHA-256, name: sha256, widget: string, required: false }
      - { label: Notes, name: notes, widget: string, required: false }
  - { label: Configuration Notes, name: configNotes, widget: text, required: false, hint: "GNSS — Configuration 탭 단계별 안내 (줄바꿈 유지됨)" }
  - label: Config Images
    name: configImages
    widget: list
    required: false
    hint: "Configuration 탭 다이어그램. 등록 순서대로 Figure 1, Figure 2... 로 표시되고 캡션이 함께 나옴"
    fields:
      - { label: Image, name: src, widget: image }
      - { label: Caption, name: caption, widget: string, required: false }
  - label: Config Parameters
    name: configParams
    widget: list
    required: false
    hint: "Configuration 탭 파라미터 표 (예: ArduPilot 설정값)"
    fields:
      - { label: Parameter, name: name, widget: string }
      - { label: Value, name: value, widget: string }
      - { label: Description, name: note, widget: string, required: false }
  - { label: Gallery, name: gallery, widget: list, required: false, field: { label: Image, name: image, widget: image }, hint: "Gallery 탭 이미지들" }

collections:
  - name: fc
    label: Flight Controllers
    folder: src/content/fc
    create: true
    slug: "{{slug}}"
    fields: *base_fields

  - name: gnss
    label: GNSS / RTK
    folder: src/content/gnss
    create: true
    slug: "{{slug}}"
    fields: *base_fields

  - name: esc
    label: ESC
    folder: src/content/esc
    create: true
    slug: "{{slug}}"
    fields: *base_fields

  - name: camera
    label: Cameras & Gimbals
    folder: src/content/camera
    create: true
    slug: "{{slug}}"
    fields: *base_fields

  - name: motor
    label: Motors
    folder: src/content/motor
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Tagline, name: tagline, widget: string, required: false }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Picture Key, name: pictureKey, widget: string, required: false }
      - { label: Order, name: order, widget: number, default: 999, value_type: int }
      - <<: *spec_field
      - { label: Description, name: description, widget: text, required: false, hint: "제품 설명 (사양표 위에 표시)" }
      - { label: Drawing, name: datasheet, widget: image, required: false, hint: "Drawing 탭에 표시되는 도면 PNG" }
      - { label: Gallery, name: gallery, widget: list, required: false, field: { label: Image, name: image, widget: image } }
      - { label: Test Conditions, name: testConditions, widget: string, required: false }
      - label: Thrust Tables
        name: thrust
        widget: list
        required: false
        fields:
          - { label: Propeller, name: propeller, widget: string }
          - { label: ESC Type, name: esc, widget: string, required: false, hint: "예) BLDC ESC, FOC ESC (Combo) — 차트 제목/표 머리글에 표시" }
          - { label: Note, name: note, widget: string, required: false, hint: "표 아래 한 줄 메모 (예: Full throttle 피크 요약)" }
          - label: Rows
            name: rows
            widget: list
            fields:
              - { label: Throttle, name: throttle, widget: string }
              - { label: Speed (rpm), name: rpm, widget: string, required: false }
              - { label: Voltage (V), name: voltage, widget: string, required: false }
              - { label: Thrust (g), name: thrust, widget: string, required: false }
              - { label: Torque (N·m), name: torque, widget: string, required: false }
              - { label: Current (A), name: current, widget: string, required: false }
              - { label: Power (W), name: power, widget: string, required: false }
              - { label: Eff (g/W), name: eff, widget: string, required: false }
              - { label: Temp (℃), name: temp, widget: string, required: false }
